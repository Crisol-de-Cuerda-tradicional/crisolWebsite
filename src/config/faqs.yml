- question:
    en: Do I have to be a seasoned musician to come to Crisol?
    es: No sé si tengo nivel suficiente para ir a Crisol
  answer:
    en: In Crisol, students distribute themselves into groups depending on their technical level with the instrument and their ability to play melodies by ear. For fiddle, we offer levels ranging from beginner to advanced. For the other instruments, we offer levels ranging from intermediate to advanced, so you'll need a bit of experience and fluency. If you have any doubts about your level, we recommend reading the "Group distribution" section in our "Classes" page. If you're a classically trained musician and you've never played folk music before, you won't have any problem adapting to the class dynamics. It's a common situation and every year there are many students who join us with a classical background.
    es: En Crisol, los alumnos se distribuyen por grupos dependiendo de su nivel técnico con el instrumento y su capacidad de tocar melodías de oído. En violín, los niveles van desde principiante a avanzado. En el resto de instrumentos, de intermedio a avanzado, por lo que se requiere un mínimo de experiencia y soltura. Si tienes dudas sobre cuál es tu nivel, te recomendamos leer atentamente el apartado "Distribución de grupos" en nuestra página de "Las Clases". Por otro lado, si eres músico de formación clásica y nunca has tocado música folk, no tendrás problema en adaptarte a la dinámica de clases. Es algo muy común y todos los años hay muchos alumnos en esa situación.
- question:
    en: I play an instrument that is not violin, cello, flute or guitar. Can I still come to Crisol?
    es: Toco un instrumento que no es violín, chelo, flauta o guitarra. ¿Puedo ir a Crisol igualmente?
  answer:
    en: In Crisol, the classes are taught by teacher whe play fiddle, cello, flute or guitar; and they're designed for students of those instruments. However, that doesn't mean that other musicians can't benefit from them. Many contents can be easily adapted, and it's quite common for advanced students to change groups simply for curiosity, to have fun or to try new things. If you have the technical level necessary to translate and apply to your instrument what the teacher is explaining, go ahead! Hurdy gurdies, bouzoukis, harps, mandolins, pianos, accordions… all of them have been at Crisol!
    es: En Crisol, las clases están impartidas por profesores que son violinistas, chelistas, flautistas y guitarristas, y en principio están pensadas para alumnos de esos mismos instrumentos. Sin embargo, eso no quiere decir que otros músicos no puedan aprovecharlas. Muchos contenidos pueden adaptarse fácilmente, y es bastante habitual que alumnos avanzados cambien de grupo simplemente por curiosidad, para divertirse o para probar cosas nuevas. Si tienes el nivel técnico necesario para “traducir” y aplicar a tu instrumento lo que el profesor está explicando, ¡adelante! Zanfonas, bouzoukis, arpas, mandolinas, pianos, acordeones… ¡por Crisol ha pasado de todo!
- question:
    en: I play the viola. Can I come to Crisol?
    es: Toco la viola. ¿Puedo ir a Crisol?
  answer:
    en: Violas are always welcome! If you're a violist, you may sometimes have to lower the melody of the violin or break your head a little to square the position changes. It may be a small challenge, but the learning is worth it.
    es: Las violas son siempre bienvenidas! Si eres violista, puede que en algunos momentos tengas que bajar una octava la melodía del violín o romperte un poco la cabeza para cuadrar los cambios de posición. Puede suponer un pequeño reto, pero el aprendizaje merece muchísimo la pena.
- question:
    en: Can I have a private room?
    es: ¿Puedo tener una habitación individual?
  answer:
    en: The short answer is NO. The hostel doesn't have private rooms. We do have a very limited number of rooms with a few beds that the organisation reserves exclusively for people with special needs or medical conditions previously communicated. If you think you need a smaller room for any of the previous reasons, please reach out to us before registering and we'll study your case.
    es: La respuesta es NO. El albergue no dispone de habitaciones individuales. Sí contamos con un número muy reducido de habitaciones con pocas camas, que la organización reserva exclusivamente para personas con necesidades especiales o condiciones médicas previamente comunicadas. Si crees que necesitas una habitación más pequeña por motivos médicos u otras circunstancias similares, por favor, ponte en contacto con nosotros antes de realizar la inscripción y estudiaremos tu caso.
- question:
    en: Are there any commodities nearby?
    es: ¿Hay servicios básicos cerca?
  answer:
    en: The village of Arlanzón, about 15 minutes walking from the hostel, only has a pharmacy, so if you need a bank or other services you'll need to drive to Ibeas de Juarros or Burgos. We recommend acquire everything you need before coming to camp (cash, medicines, something to snack on if you like it) because once you're in the granja escuela it won't be easy to get.
    es: El pueblo de Arlanzón, a unos 15 minutos andando desde el albergue, dispone únicamente de farmacia, por lo que si necesitas un banco u otros servicios necesitarás un coche para desplazarte a Ibeas de Juarros o Burgos capital. Desde la organización recomendamos que traigas todo lo necesario de casa (dinero en efectivo, medicinas, algo de picar si te suele dar antojo), porque una vez en la granja escuela no será fácil de conseguir.
- question:
    en: What is the minimum age to attend?
    es: ¿Cuál es la edad mínima para asistir?
  answer:
    en: There's no minimum age to attend Crisol, but underage students must meet some conditions. If you need more information, plase read the "Minors" section in our "Registration" page.
    es: No tenemos edad mínima para asistir al campamento, pero los menores de edad deberán cumplir algunas condiciones. Si quieres más información, lee atentamente el apartado “Menores de edad” en nuestra página de "Inscripciones".
- question:
    en: Is there a vegan/vegetarian menu?
    es: ¿Hay menú vegano/vegetariano?
  answer:
    en: Yes. We currently offer two types of menu, omnivore and vegan. We will also attend to any individual dietary requirements. If you have any allergies, intolerances or specific requirements, please let us know when you register.
    es: Sí. Actualmente, en el albergue ofrecen dos tipos de menú, uno omnívoro y otro vegano. También se atenderán las necesidades alimentarias individuales de cada alumno. Si tienes alguna alergia, intolerancia o requerimiento específico, podrás indicarlo en el formulario de inscripción.
- question:
    en: Can I come to Crisol as a companion (to tutorize my child/minor or to accompany my partner/friend)?
    es: ¿Puedo ir a Crisol como acompañante (para tutorizar a mi hijo/a menor de edad o acompañar a mi pareja/amigo?
  answer:
    en: Attendance as a non-participating companion is subject to availability. During the registration process, students enrolled in the course will always take priority over companions. Available places for companions will be confirmed no later than early July — meaning that if spaces remain in the hostel at that point, you will be able to attend as a companion. If your participation in the camp depends on a companion being able to join you, please get in touch with us before registering and we will look into your situation carefully.
    es: La asistencia de acompañantes está sujeta a la disponibilidad de plaza. En el proceso de inscripción siempre tendrá prioridad el alumnado que participe en el curso frente a las personas acompañantes. Las plazas disponibles para acompañantes se confirmarán, como muy tarde, a principios de julio. Es decir, si en ese momento quedan plazas libres en el albergue, podrás asistir como acompañante. Si tu participación en el campamento depende de que pueda asistir una persona acompañante, ponte en contacto con nosotros antes de inscribirte y estudiaremos tu caso con atención.
- question:
    en: I have reduced mobility. Is the hostel adapted?
    es: Tengo movilidad reducida. ¿El albergue está acondicionado?
  answer:
    en: Yes. The hostel is adapted for people with reduced mobility. If you have any specific needs or would like more information about the accessibility of the facilities, please don't hesitate to get in touch and we'll be happy to help.
    es: Sí. El albergue está adaptado para personas con movilidad reducida. Si tienes alguna necesidad específica o quieres más información sobre la accesibilidad de los espacios, no dudes en escribirnos y estaremos encantados de ayudarte.
